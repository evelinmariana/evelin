<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequenos Guardiões da Natureza - Memória Ecológica</title>
    <style>
        /* Configurações Gerais e Cores Alegres */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2f1 0%, #c8e6c9 100%);
            color: #2e7d32;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #1b5e20;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        p.subtitulo {
            font-size: 1.2rem;
            color: #388e3c;
            font-weight: bold;
        }

        /* Tabuleiro do Jogo */
        .jogo-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
        }

        /* Estilo das Cartas */
        .carta {
            aspect-ratio: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .carta.virada {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* Verso da Carta (Escondido) */
        .verso {
            background-color: #4caf50;
            border: 4px solid #2e7d32;
            color: white;
        }

        .verso::after {
            content: "🌱";
        }

        /* Frente da Carta (Revelado) */
        .frente {
            background-color: #fff;
            border: 4px solid #81c784;
            transform: rotateY(180deg);
        }

        /* Mensagem de Vitória e Reinício */
        .vitoria-mensagem {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background-color: #a5d6a7;
            border-radius: 15px;
            color: #1b5e20;
            font-size: 1.3rem;
            font-weight: bold;
            animation: pop 0.5s ease;
        }

        blockquote {
            font-style: italic;
            margin-top: 10px;
            color: #2e7d32;
        }

        .btn-reiniciar {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2rem;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-reiniciar:hover {
            background-color: #f57c00;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 450px) {
            .tabuleiro { gap: 8px; }
            .face { font-size: 1.8rem; border-width: 2px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pequenos Guardiões da Natureza</h1>
        <p class="subtitulo">Jogo da Memória Ecológica 🌍</p>
    </header>

    <main class="jogo-container">
        <div class="tabuleiro" id="tabuleiro">
            </div>

        <div class="vitoria-mensagem" id="mensagemVitoria">
            🎉 Parabéns, Super Guardião! Você encontrou todos os pares! 🎉
            <blockquote>"Pequenas atitudes fazem grande diferença."</blockquote>
            <button class="btn-reiniciar" onclick="reiniciarJogo()">Jogar De Novo 🔄</button>
        </div>
    </main>

    <script>
        // Ícones ecológicos para os pares do jogo
        const icones = ['🌳', '🐝', '♻️', '💧', '🦊', '🌱', '☀️', '🌻'];
        // Duplica a lista para formar os pares
        let cartasLista = [...icones, ...icones];
        
        let cartasViradas = [];
        let paresEncontrados = 0;
        let bloqueiaTabuleiro = false;

        const tabuleiro = document.getElementById('tabuleiro');
        const mensagemVitoria = document.getElementById('mensagemVitoria');

        // Função para embaralhar os itens da lista
        function embaralhar(lista) {
            return lista.sort(() => Math.random() - 0.5);
        }

        // Função para criar as cartas no HTML
        function criarTabuleiro() {
            tabuleiro.innerHTML = '';
            mensagemVitoria.style.display = 'none';
            paresEncontrados = 0;
            cartasViradas = [];
            bloqueiaTabuleiro = false;
            
            const cartasEmbaralhadas = embaralhar(cartasLista);

            cartasEmbaralhadas.forEach((icone, index) => {
                const carta = document.createElement('div');
                carta.classList.add('carta');
                carta.dataset.icone = icone;
                carta.dataset.index = index;

                const verso = document.createElement('div');
                verso.classList.add('face', 'verso');

                const frente = document.createElement('div');
                frente.classList.add('face', 'frente');
                frente.textContent = icone;

                carta.appendChild(verso);
                carta.appendChild(frente);
                carta.addEventListener('click', virarCarta);
                tabuleiro.appendChild(carta);
            });
        }

        // Lógica para virar a carta ao clicar
        function virarCarta() {
            if (bloqueiaTabuleiro) return;
            if (this.classList.contains('virada')) return;

            this.classList.add('virada');
            cartasViradas.push(this);

            if (cartasViradas.length === 2) {
                verificarPar();
            }
        }

        // Verifica se as duas cartas viradas são iguais
        function verificarPar() {
            bloqueiaTabuleiro = true;
            const [carta1, carta2] = cartasViradas;

            if (carta1.dataset.icone === carta2.dataset.icone) {
                // Acertou o par
                paresEncontrados++;
                cartasViradas = [];
                bloqueiaTabuleiro = false;

                if (paresEncontrados === icones.length) {
                    setTimeout(() => {
                        mensagemVitoria.style.display = 'block';
                    }, 500);
                }
            } else {
                // Errou o par, vira de volta após 1 segundo
                setTimeout(() => {
                    carta1.classList.remove('virada');
                    carta2.classList.remove('virada');
                    cartasViradas = [];
                    bloqueiaTabuleiro = false;
                }, 1000);
            }
        }

        // Função do botão reiniciar
        function reiniciarJogo() {
            criarTabuleiro();
        }

        // Inicia o jogo assim que a página carrega
        criarTabuleiro();
    </script>

</body>
</html>
